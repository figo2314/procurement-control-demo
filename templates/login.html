{% extends "base.html" %}
{% block title %}Manager Login - Procurement Control{% endblock %}

{% block content %}
<section class="login-shell">
    <form class="login-panel" method="post">
        <p class="eyebrow">Secure access</p>
        <h1>Manager login</h1>
        <label>Username
            <input name="username" autocomplete="username" required>
        </label>
        <label>Password
            <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button full" type="submit">Enable Manager Mode</button>
        <p class="hint">Demo admin: admin / admin123</p>
    </form>
</section>
{% endblock %}
